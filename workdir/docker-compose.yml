version: '3.8'

services:

  nexus-node-001:
    image: nexusxyz/nexus-cli:latest
    container_name: nexus-node-001
    restart: unless-stopped
    networks:
      - nexus-network
    ports:
      - "10000:10000"
    environment:
      - RUST_LOG=info
      - NEXUS_HOME=/app/.nexus
      - NETWORK=testnet3
      - TZ=Asia/Jakarta
      - NODE_ID=001
    volumes:
      - nexus_data_001:/app/.nexus
      - /tmp/nexus-orchestrator/workdir/credentials.json:/app/.nexus/credentials.json:ro
    command: ["start", "--headless", "--node-id", "001"]
    labels:
      - "nexus.network=true"
      - "nexus.service=prover"
      - "nexus.node_id=001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nexus-node-002:
